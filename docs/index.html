<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Playoff Runner — Playable Preview</title>
<style>
  :root { --bg:#0e0e14; --panel:#17171f; --line:#262633; --txt:#e7e7ef; --muted:#9aa; --accent:#9945ff; --accent2:#14f195; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body {
    background: radial-gradient(1200px 600px at 50% -10%, #1c1430 0%, var(--bg) 60%);
    color:var(--txt); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    display:flex; flex-direction:column; overflow:hidden;
  }
  header {
    display:flex; align-items:center; gap:14px; padding:12px 18px; border-bottom:1px solid var(--line);
    flex:0 0 auto;
  }
  header h1 { font-size:15px; font-weight:700; letter-spacing:.2px; }
  header h1 b { background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .spacer { flex:1; }
  .seg { display:inline-flex; background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .seg button { background:transparent; color:var(--muted); border:0; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; }
  .seg button.on { background:linear-gradient(90deg,var(--accent),#7b2ff7); color:#fff; }
  .stage { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
  .frame-scale { transform-origin:center center; transition:transform .15s ease; }
  .frame {
    position:relative; background:#000; border:14px solid #1b1b22; border-radius:46px;
    box-shadow:0 0 0 2px #333, 0 30px 60px rgba(0,0,0,.6); overflow:hidden;
  }
  .frame.tablet { border-radius:26px; border-width:18px; }
  .frame .notch {
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    width:120px; height:26px; background:#1b1b22; border-radius:0 0 16px 16px; z-index:5; pointer-events:none;
  }
  .frame.landscape .notch { top:50%; left:8px; transform:translateY(-50%); width:26px; height:120px; border-radius:0 16px 16px 0; }
  .frame.tablet .notch { display:none; }
  iframe { display:block; border:0; width:100%; height:100%; background:#000; }
  .pause-overlay {
    position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; gap:10px;
    background:rgba(0,0,0,.78); color:#cfcfe0; z-index:10; backdrop-filter:blur(2px);
  }
  .pause-overlay.show { display:flex; }
  .pause-overlay svg { width:54px; height:54px; opacity:.85; }
  .pause-overlay .t { font-size:14px; }
  footer {
    display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap;
    padding:12px 16px; border-top:1px solid var(--line); flex:0 0 auto;
  }
  select, .tbtn {
    background:var(--panel); color:var(--txt); border:1px solid var(--line); border-radius:10px;
    padding:9px 14px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit;
  }
  select { min-width:180px; }
  .tbtn { display:inline-flex; align-items:center; gap:7px; }
  .tbtn:hover, select:hover { border-color:#3a3a4d; }
  .tbtn.on { background:linear-gradient(90deg,var(--accent),#7b2ff7); color:#fff; border-color:transparent; }
  .tbtn svg { width:16px; height:16px; }
  .dim { color:var(--muted); font-size:12px; }
  @media (max-width:640px) {
    header h1 span.full { display:none; }
    footer { gap:7px; padding:8px; }
    select { min-width:130px; }
  }
</style>
</head>
<body>
  <header>
    <h1><b>Playoff Runner</b> <span class="full">— playable preview</span></h1>
    <div class="spacer"></div>
    <div class="seg" id="skin">
      <button data-skin="original" class="on">Original</button>
      <button data-skin="solana">Solana &#11088;</button>
    </div>
  </header>

  <div class="stage">
    <div class="frame-scale" id="frameScale">
      <div class="frame" id="frame">
        <div class="notch"></div>
        <iframe id="game" title="playable" allow="autoplay"></iframe>
        <div class="pause-overlay" id="pauseOverlay">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
          <div class="t">Ad paused</div>
          <div class="dim">Toggle visibility to resume</div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <select id="device" aria-label="Device">
      <optgroup label="Phones">
        <option value="iphone-16-pro-max">iPhone 16 Pro Max</option>
        <option value="iphone-16-pro">iPhone 16 Pro</option>
        <option value="iphone-se">iPhone SE</option>
        <option value="pixel-7-pro">Google Pixel 7 Pro</option>
        <option value="galaxy-s23-ultra">Samsung Galaxy S23 Ultra</option>
        <option value="generic-android">Generic Android</option>
      </optgroup>
      <optgroup label="Tablets">
        <option value="ipad-pro-12">iPad Pro 12.9"</option>
        <option value="ipad-air">iPad Air</option>
        <option value="galaxy-tab-s8">Samsung Galaxy Tab S8</option>
        <option value="generic-tablet">Generic Tablet</option>
      </optgroup>
    </select>
    <button class="tbtn" id="orient">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="7" y="3" width="10" height="18" rx="2"/></svg>
      <span>Portrait</span>
    </button>
    <button class="tbtn" id="mute">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M16 9c1.2 1 1.2 5 0 6"/></svg>
      <span>Sound</span>
    </button>
    <button class="tbtn" id="pause">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
      <span>Ad pause</span>
    </button>
    <button class="tbtn" id="reload">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 4v5h-5"/></svg>
      <span>Reload</span>
    </button>
  </footer>

<script>
  var DEVICES = {
    'iphone-16-pro-max':{w:440,h:956,type:'phone'},
    'iphone-16-pro':{w:402,h:874,type:'phone'},
    'iphone-se':{w:375,h:667,type:'phone'},
    'pixel-7-pro':{w:412,h:892,type:'phone'},
    'galaxy-s23-ultra':{w:384,h:824,type:'phone'},
    'generic-android':{w:412,h:915,type:'phone'},
    'ipad-pro-12':{w:1024,h:1366,type:'tablet'},
    'ipad-air':{w:820,h:1180,type:'tablet'},
    'galaxy-tab-s8':{w:800,h:1280,type:'tablet'},
    'generic-tablet':{w:768,h:1024,type:'tablet'}
  };
  var state = { device:'iphone-16-pro-max', orientation:'portrait', skin:'original', muted:false, paused:false };
  var el = function(id){ return document.getElementById(id); };
  var frame = el('frame'), frameScale = el('frameScale'), game = el('game');
  var stage = document.querySelector('.stage');

  function post(msg){ try{ if(game.contentWindow) game.contentWindow.postMessage(msg,'*'); }catch(e){} }
  function loadSkin(){ game.src = './play/' + state.skin + '.html'; }

  function layout(){
    var d = DEVICES[state.device];
    var landscape = state.orientation === 'landscape';
    var w = landscape ? d.h : d.w;
    var h = landscape ? d.w : d.h;
    frame.style.width = w + 'px';
    frame.style.height = h + 'px';
    frame.classList.toggle('tablet', d.type==='tablet');
    frame.classList.toggle('landscape', landscape);
    var bezel = (d.type==='tablet'?36:28);
    var fw = w + bezel, fh = h + bezel;
    var avail = stage.getBoundingClientRect();
    var s = Math.min((avail.width-32)/fw, (avail.height-32)/fh, 1);
    frameScale.style.transform = 'scale(' + s + ')';
  }

  el('skin').addEventListener('click', function(e){
    var b = e.target.closest('button'); if(!b) return;
    state.skin = b.dataset.skin;
    var kids = el('skin').children;
    for (var i=0;i<kids.length;i++) kids[i].classList.toggle('on', kids[i]===b);
    loadSkin();
  });
  el('device').addEventListener('change', function(e){ state.device = e.target.value; layout(); });
  el('orient').addEventListener('click', function(){
    state.orientation = state.orientation==='portrait' ? 'landscape' : 'portrait';
    el('orient').querySelector('span').textContent = state.orientation==='portrait'?'Portrait':'Landscape';
    el('orient').classList.toggle('on', state.orientation==='landscape');
    layout();
  });
  el('mute').addEventListener('click', function(){
    state.muted = !state.muted;
    el('mute').classList.toggle('on', state.muted);
    el('mute').querySelector('span').textContent = state.muted?'Muted':'Sound';
    post({type:'mute', muted:state.muted});
  });
  el('pause').addEventListener('click', function(){
    state.paused = !state.paused;
    el('pauseOverlay').classList.toggle('show', state.paused);
    el('pause').classList.toggle('on', state.paused);
    post({type: state.paused?'pause':'resume'});
  });
  el('reload').addEventListener('click', function(){ loadSkin(); });

  window.addEventListener('resize', layout);
  loadSkin();
  layout();
</script>
</body>
</html>
